          type: boolean
          default: false
        heartHealthy:
          type: boolean
          default: false
        noFishSafe:
          type: boolean
          default: false
        kidFriendly:
          type: boolean
          default: false
        budgetFit:
          type: boolean
          default: false
        weeknightTimeSafe:
          type: boolean
          default: false
        validationNotes:
          type: string
    HouseholdDocumentUpsertRequest:
      type: object
      required:
        - content
      properties:
        title:
          type: string
        content:
          type: string
    MealUpsertRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        cuisine:
          type: string
        prepTimeActiveMinutes:
          type: integer
          minimum: 0
        prepTimeTotalMinutes:
          type: integer
          minimum: 0
        costEstimateCents:
          type: integer
          minimum: 0
        servings:
          type: integer
          minimum: 1
          default: 7
        ingredients:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/Ingredient"
        methodSteps:
          type: array
          default: []
          items:
            type: string
            minLength: 1
        kidAdaptations:
          type: string
        batchPrepNote:
          type: string
        validation:
