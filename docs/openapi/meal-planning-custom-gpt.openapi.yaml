          minLength: 1
        cuisine:
          type: string
        prepTimeActiveMinutes:
          type: integer
          minimum: 0
        prepTimeTotalMinutes:
          type: integer
          minimum: 0
        costEstimateCents:
          type: integer
          minimum: 0
        servings:
          type: integer
          minimum: 1
        ingredients:
