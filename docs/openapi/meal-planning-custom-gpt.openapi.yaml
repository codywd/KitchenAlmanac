openapi: 3.0.3
info:
  title: Kitchen Almanac API for Custom GPT Actions
  version: "1.0.0"
  description: >
    API-key-compatible endpoints for Kitchen Almanac. Configure a Custom GPT
    action with API key authentication set to Bearer and paste a family API key
    created in the app at /api-keys.
servers:
  - url: https://meals.dostal.co
    description: Production
  - url: http://localhost:3000
    description: Local development
security:
  - bearerApiKey: []
tags:
  - name: Planning Context
    description: Household guidance and planning brief context for outside planners.
  - name: Meal Plan Import
    description: Import outside-LLM weekly meal plans.
  - name: Weeks
    description: Week, day, meal, and grocery-list management.
  - name: Meals
    description: Dinner updates and feedback.
  - name: Rejected Meals
    description: Household avoid-list entries.
paths:
  /api/household-profile:
    get:
      tags:
        - Planning Context
      operationId: getHouseholdProfile
      summary: Get household planning context
      description: >
        Returns family-scoped household guidance, active rejected meals, family
        members, pantry staples, saved recipes, and recent meal-vote signals.
      responses:
        "200":
          description: Household profile context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HouseholdProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/planning-brief:
    get:
      tags:
        - Planning Context
      operationId: getPlanningBrief
      summary: Generate a meal planning brief
      description: >
        Returns a markdown planning brief plus structured context. API-key
        callers are treated as family admin callers.
      parameters:
        - name: weekStart
          in: query
          required: false
          description: Target planning week start date. Defaults to the next planning week.
          schema:
            $ref: "#/components/schemas/DateOnly"
        - name: budgetTargetCents
          in: query
          required: false
          description: Positive integer budget target in cents.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Planning brief.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanningBriefResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/household-documents:
    get:
      tags:
        - Planning Context
      operationId: listHouseholdDocuments
      summary: List household guidance documents
      responses:
        "200":
          description: Household guidance documents.
          content:
            application/json:
              schema:
                type: object
                required:
                  - documents
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/HouseholdDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/household-documents/{kind}:
    put:
      tags:
        - Planning Context
      operationId: upsertHouseholdDocument
      summary: Upsert household guidance by kind
      parameters:
        - name: kind
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/HouseholdDocumentKind"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HouseholdDocumentUpsertRequest"
      responses:
        "200":
          description: Upserted household document.
          content:
            application/json:
              schema:
                type: object
                required:
                  - document
                properties:
                  document:
                    $ref: "#/components/schemas/HouseholdDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/saved-recipes:
    get:
      tags:
        - Planning Context
      operationId: listSavedRecipes
      summary: List saved recipes
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: string
            enum:
              - "true"
              - "false"
              - all
            default: "true"
      responses:
        "200":
          description: Saved recipes.
          content:
            application/json:
              schema:
                type: object
                required:
                  - savedRecipes
                properties:
                  savedRecipes:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavedRecipe"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Planning Context
      operationId: createSavedRecipe
      summary: Create a saved recipe from JSON recipe fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRecipeWriteRequest"
      responses:
        "201":
          description: Created saved recipe.
          content:
            application/json:
              schema:
                type: object
                required:
                  - savedRecipe
                properties:
                  savedRecipe:
                    $ref: "#/components/schemas/SavedRecipe"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/saved-recipes/from-meal:
    post:
      tags:
        - Planning Context
      operationId: saveMealToRecipeLibrary
      summary: Save or refresh a saved recipe from an existing meal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRecipeFromMealRequest"
      responses:
        "200":
          description: Saved recipe result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  recipeId:
                    type: string
                  weekId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/saved-recipes/{recipeId}:
    get:
      tags:
        - Planning Context
      operationId: getSavedRecipe
      summary: Get full saved recipe details
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Saved recipe.
          content:
            application/json:
              schema:
                type: object
                required:
                  - savedRecipe
                properties:
                  savedRecipe:
                    $ref: "#/components/schemas/SavedRecipe"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Planning Context
      operationId: updateSavedRecipe
      summary: Patch a saved recipe
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRecipePatchRequest"
      responses:
        "200":
          description: Updated saved recipe.
          content:
            application/json:
              schema:
                type: object
                required:
                  - savedRecipe
                properties:
                  savedRecipe:
                    $ref: "#/components/schemas/SavedRecipe"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/pantry-staples:
    get:
      tags:
        - Planning Context
      operationId: listPantryStaples
      summary: List pantry staples
      parameters:
        - name: active
          in: query
          required: false
          schema:
            type: string
            enum:
              - "true"
              - "false"
              - all
            default: "true"
      responses:
        "200":
          description: Pantry staples.
          content:
            application/json:
              schema:
                type: object
                required:
                  - pantryStaples
                properties:
                  pantryStaples:
                    type: array
                    items:
                      $ref: "#/components/schemas/PantryStaple"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Planning Context
      operationId: upsertPantryStaple
      summary: Add or reactivate a pantry staple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PantryStapleCreateRequest"
      responses:
        "201":
          description: Pantry staple.
          content:
            application/json:
              schema:
                type: object
                required:
                  - pantryStaple
                properties:
                  pantryStaple:
                    $ref: "#/components/schemas/PantryStaple"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/pantry-staples/{stapleId}:
    patch:
      tags:
        - Planning Context
      operationId: updatePantryStaple
      summary: Activate or deactivate a pantry staple
      parameters:
        - name: stapleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PantryStaplePatchRequest"
      responses:
        "200":
          description: Pantry staple.
          content:
            application/json:
              schema:
                type: object
                required:
                  - pantryStaple
                properties:
                  pantryStaple:
                    $ref: "#/components/schemas/PantryStaple"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/import/meal-plan:
    post:
      tags:
        - Meal Plan Import
      operationId: importMealPlan
      summary: Import a weekly meal plan
      description: >
        Imports an outside-LLM meal plan, upserts the target week, creates or
        replaces dinners for the mapped dates, stores the grocery list, and
        preserves the raw import. This action models the safer envelope request
        shape, though the route also accepts a raw imported meal plan with
        weekStart supplied as a query parameter.
      parameters:
        - name: weekStart
          in: query
          required: false
          description: Optional fallback week start if the request body omits weekStart.
          schema:
            $ref: "#/components/schemas/DateOnly"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPlanImportEnvelope"
      responses:
        "201":
          description: Import result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealPlanImportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/weeks:
    get:
      tags:
        - Weeks
      operationId: listWeeks
      summary: List family weeks
      responses:
        "200":
          description: Weeks newest first.
          content:
            application/json:
              schema:
                type: object
                required:
                  - weeks
                properties:
                  weeks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Week"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Weeks
      operationId: createWeek
      summary: Create or update a week by start date
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWeekRequest"
      responses:
        "201":
          description: Created or updated week.
          content:
            application/json:
              schema:
                type: object
                required:
                  - week
                properties:
                  week:
                    $ref: "#/components/schemas/Week"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/weeks/{weekId}:
    get:
      tags:
        - Weeks
      operationId: getWeek
      summary: Get a family week
      parameters:
        - $ref: "#/components/parameters/WeekId"
      responses:
        "200":
          description: Week details.
          content:
            application/json:
              schema:
                type: object
                required:
                  - week
                properties:
                  week:
                    $ref: "#/components/schemas/Week"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/weeks/{weekId}/days/{date}/meals:
    post:
      tags:
        - Weeks
      operationId: upsertDinnerForDate
      summary: Create or replace a dinner for a date
      parameters:
        - $ref: "#/components/parameters/WeekId"
        - name: date
          in: path
          required: true
          description: Dinner date.
          schema:
            $ref: "#/components/schemas/DateOnly"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealUpsertRequest"
      responses:
        "201":
          description: Created or replaced meal.
          content:
            application/json:
              schema:
                type: object
                required:
                  - meal
                properties:
                  meal:
                    $ref: "#/components/schemas/Meal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/weeks/{weekId}/days/{date}/meals/from-saved-recipe:
    post:
      tags:
        - Weeks
      operationId: replaceDinnerFromSavedRecipe
      summary: Replace a dinner from a saved recipe
      parameters:
        - $ref: "#/components/parameters/WeekId"
        - name: date
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DateOnly"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedRecipeSwapRequest"
      responses:
        "200":
          description: Replacement result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  mealId:
                    type: string
                  weekId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/weeks/{weekId}/grocery-list:
    post:
      tags:
        - Weeks
      operationId: upsertGroceryList
      summary: Create or replace a grocery list for a week
      parameters:
        - $ref: "#/components/parameters/WeekId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroceryListUpsertRequest"
      responses:
        "201":
          description: Created or replaced grocery list.
          content:
            application/json:
              schema:
                type: object
                required:
                  - groceryList
                properties:
                  groceryList:
                    $ref: "#/components/schemas/GroceryList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/weeks/{weekId}/grocery-list/refresh:
    post:
      tags:
        - Weeks
      operationId: refreshGroceryList
      summary: Refresh the stored grocery list from current dinners
      parameters:
        - $ref: "#/components/parameters/WeekId"
      responses:
        "200":
          description: Refresh result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  groceryList:
                    $ref: "#/components/schemas/GroceryList"
                  itemCount:
                    type: integer
                  message:
                    type: string
                  weekId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/weeks/{weekId}/grocery-reconciliation:
    get:
      tags:
        - Weeks
      operationId: getGroceryReconciliation
      summary: Compare derived grocery items with the stored grocery list
      parameters:
        - $ref: "#/components/parameters/WeekId"
      responses:
        "200":
          description: Grocery reconciliation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryReconciliationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/weeks/{weekId}/shopping-items:
    post:
      tags:
        - Weeks
      operationId: updateShoppingItemStatus
      summary: Update one shopping item status
      description: API-key calls are attributed to the user who created the key.
      parameters:
        - $ref: "#/components/parameters/WeekId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShoppingItemStatusUpdateRequest"
      responses:
        "200":
          description: Shopping item status updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  shoppingItemState:
                    $ref: "#/components/schemas/ShoppingItemState"
                  weekId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/meals/{mealId}:
    patch:
      tags:
        - Meals
      operationId: updateMeal
      summary: Patch a meal
      parameters:
        - $ref: "#/components/parameters/MealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealPatchRequest"
      responses:
        "200":
          description: Updated meal.
          content:
            application/json:
              schema:
                type: object
                required:
                  - meal
                properties:
                  meal:
                    $ref: "#/components/schemas/Meal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/meals/{mealId}/feedback:
    post:
      tags:
        - Meals
      operationId: recordMealFeedback
      summary: Record meal feedback
      parameters:
        - $ref: "#/components/parameters/MealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealFeedbackRequest"
      responses:
        "200":
          description: Updated meal feedback, optionally with a rejected-meal pattern.
          content:
            application/json:
              schema:
                type: object
                required:
                  - meal
                  - rejectedMeal
                properties:
                  meal:
                    $ref: "#/components/schemas/Meal"
                  rejectedMeal:
                    allOf:
                      - $ref: "#/components/schemas/RejectedMeal"
                    nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/meals/{mealId}/outcome:
    post:
      tags:
        - Meals
      operationId: saveMealOutcome
      summary: Save meal closeout outcome
      parameters:
        - $ref: "#/components/parameters/MealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealOutcomeRequest"
      responses:
        "200":
          description: Outcome result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meal:
                    $ref: "#/components/schemas/Meal"
                  rejectedMeal:
                    allOf:
                      - $ref: "#/components/schemas/RejectedMeal"
                    nullable: true
                  weekId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/meals/{mealId}/vote:
    post:
      tags:
        - Meals
      operationId: upsertMealVote
      summary: Upsert the caller actor's vote for a meal
      parameters:
        - $ref: "#/components/parameters/MealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealVoteRequest"
      responses:
        "200":
          description: Meal vote.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mealVote:
                    $ref: "#/components/schemas/MealVote"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/rejected-meals:
    get:
      tags:
        - Rejected Meals
      operationId: listRejectedMeals
      summary: List rejected meals and avoid patterns
      responses:
        "200":
          description: Rejected meals newest first.
          content:
            application/json:
              schema:
                type: object
                required:
                  - rejectedMeals
                properties:
                  rejectedMeals:
                    type: array
                    items:
                      $ref: "#/components/schemas/RejectedMeal"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Rejected Meals
      operationId: createRejectedMeal
      summary: Create a rejected-meal avoid pattern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectedMealCreateRequest"
      responses:
        "201":
          description: Created rejected meal.
          content:
            application/json:
              schema:
                type: object
                required:
                  - rejectedMeal
                properties:
                  rejectedMeal:
                    $ref: "#/components/schemas/RejectedMeal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/rejected-meals/{id}:
    patch:
      tags:
        - Rejected Meals
      operationId: updateRejectedMeal
      summary: Patch a rejected-meal avoid pattern
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Rejected meal id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectedMealPatchRequest"
      responses:
        "200":
          description: Updated rejected meal.
          content:
            application/json:
              schema:
                type: object
                required:
                  - rejectedMeal
                properties:
                  rejectedMeal:
                    $ref: "#/components/schemas/RejectedMeal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: Kitchen Almanac family API key
      description: Use a key created in /api-keys, for example mp_prefix_secret.
  parameters:
    MealId:
      name: mealId
      in: path
      required: true
      description: Meal id.
      schema:
        type: string
    WeekId:
      name: weekId
      in: path
      required: true
      description: Week id.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/ErrorResponse"
              - $ref: "#/components/schemas/ValidationErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: Authentication required.
    Forbidden:
      description: Authenticated caller does not have access.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    DateOnly:
      type: string
      format: date
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      example: "2026-04-27"
    DateTime:
      type: string
      format: date-time
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
    ValidationErrorResponse:
      type: object
      required:
        - error
        - details
      properties:
        error:
          type: string
          example: Invalid request body.
        details:
          type: array
          items:
            type: object
            additionalProperties: true
    FamilyRole:
      type: string
      enum:
        - OWNER
        - ADMIN
        - MEMBER
    HouseholdDocumentKind:
      type: string
      enum:
        - HOUSEHOLD_PROFILE
        - MEDICAL_GUIDELINES
        - BATCH_PREP_PATTERNS
    MealFeedbackStatus:
      type: string
      enum:
        - PLANNED
        - LIKED
        - WORKED_WITH_TWEAKS
        - REJECTED
    MealOutcomeStatus:
      type: string
      enum:
        - PLANNED
        - COOKED
        - SKIPPED
        - REPLACED
        - LEFTOVERS
    MealVoteValue:
      type: string
      enum:
        - WANT
        - OKAY
        - "NO"
    ShoppingItemStatus:
      type: string
      enum:
