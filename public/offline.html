<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KitchenAlmanac Offline</title>
    <style>
      :root {
        color: #25180f;
        background: #fff7e8;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        border: 1px solid rgba(37, 24, 15, 0.18);
        background: rgba(255, 253, 245, 0.72);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.05;
      }

      p {
        color: #6f5841;
        font-size: 1rem;
        font-weight: 650;
        line-height: 1.6;
        margin: 14px 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>KitchenAlmanac is offline.</h1>
      <p>
        Reopen a shopping list you visited before, or reconnect to load the rest
        of KitchenAlmanac.
      </p>
    </main>
  </body>
</html>
